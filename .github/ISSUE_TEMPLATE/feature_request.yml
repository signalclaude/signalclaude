name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["type: feature"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of SignalClaude would this affect?
      options:
        - CLI (signalclaude)
        - Launcher
        - MCP Server
        - Web Dashboard
        - Server API
        - Shared Library
        - New Component
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why do you need it?
      placeholder: I find it frustrating when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you have tried?
    validations:
      required: false