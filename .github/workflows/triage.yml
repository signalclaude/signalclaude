name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage with Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          AZURE_DEVOPS_ORG: https://dev.azure.com/ScottSingleton
          AZURE_DEVOPS_PROJECT: SignalClaude
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title;
            const body = issue.body || '';
            const labels = issue.labels.map(l => l.name);

            // Extract component from template dropdown (if user selected one)
            const componentMatch = body.match(/### Component\s*\n\s*(.+)/);
            const relatedMatch = body.match(/### Related Component\s*\n\s*(.+)/);
            const selectedComponent = componentMatch ? componentMatch[1].trim() : (relatedMatch ? relatedMatch[1].trim() : null);

            // Map dropdown values to label names
            const componentMap = {
              'CLI (signalclaude)': 'cli',
              'Launcher': 'launcher',
              'MCP Server': 'mcp-server',
              'Web Dashboard': 'web',
              'Server API': 'server',
              'Shared Library': 'shared',
              'General / Setup': 'cli',
              'New Component': 'cli'
            };

            const prompt = [
              'You are a bug triage assistant for SignalClaude, a multi-session AI agent operations dashboard for Claude Code.',
              '',
              'Analyze this GitHub issue and return a JSON object with your classification.',
              '',
              '## Issue Title',
              title,
              '',
              '## Issue Body',
              body,
              '',
              '## Template Labels Already Applied',
              labels.join(', ') || 'none',
              '',
              '## User-Selected Component (from dropdown)',
              selectedComponent || 'not selected',
              '',
              '## Available Components',
              '- cli: The CLI package (signalclaude) - Commander.js commands, global install, config',
              '- launcher: Process manager - spawning Claude Code, stream parsing, retry detection, metrics',
              '- mcp-server: MCP server - ask_user, notify_user, check_commands, permission_prompt tools',
              '- server: Backend API - Express routes, Socket.IO, Drizzle ORM, Postgres, auth',
              '- web: Web dashboard - React frontend, mobile PWA, session cards, real-time updates',
              '- shared: Shared library - types, events, Zod validation schemas',
              '',
              '## Available Priorities',
              '- critical: Production down, data loss, security vulnerability',
              '- high: Major feature broken, blocking workflow',
              '- medium: Important but has workaround',
              '- low: Minor inconvenience, cosmetic, nice-to-have',
              '',
              '## Instructions',
              '1. If the user selected a component, use it. Otherwise infer from the content.',
              '2. Determine priority based on severity and impact.',
              '3. Write a brief triage summary (2-3 sentences max).',
              '4. Determine the Azure DevOps work item type: "Bug" for bugs, "User Story" for features, "Issue" for questions.',
              '',
              'Return ONLY valid JSON, no markdown fences:',
              '{"component":"cli|launcher|mcp-server|server|web|shared","priority":"critical|high|medium|low","summary":"Brief triage summary","azureType":"Bug|User Story|Issue","needsMoreInfo":true/false}'
            ].join('\n');

            // Call Claude API
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 512,
                messages: [{ role: 'user', content: prompt }]
              })
            });

            if (!response.ok) {
              const err = await response.text();
              core.setFailed('Claude API error: ' + response.status + ' ' + err);
              return;
            }

            const result = await response.json();
            const text = result.content[0].text;

            let classification;
            try {
              classification = JSON.parse(text);
            } catch (e) {
              const jsonMatch = text.match(/\{[\s\S]*\}/);
              if (jsonMatch) {
                classification = JSON.parse(jsonMatch[0]);
              } else {
                core.setFailed('Failed to parse Claude response: ' + text);
                return;
              }
            }

            // If user selected a component in the dropdown, prefer that
            if (selectedComponent && componentMap[selectedComponent]) {
              classification.component = componentMap[selectedComponent];
            }

            console.log('Classification:', JSON.stringify(classification, null, 2));

            // Apply labels
            const labelsToAdd = [
              'component: ' + classification.component,
              'priority: ' + classification.priority
            ];

            if (classification.needsMoreInfo) {
              labelsToAdd.push('status: needs-info');
            } else {
              labelsToAdd.push('status: confirmed');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labelsToAdd
            });

            // Post triage comment
            const priorityEmoji = { critical: '\ud83d\udd34', high: '\ud83d\udfe0', medium: '\ud83d\udfe1', low: '\ud83d\udfe2' };

            let comment = '### Triage Summary\n\n';
            comment += '**Priority:** ' + (priorityEmoji[classification.priority] || '') + ' ' + classification.priority + '\n';
            comment += '**Component:** ' + classification.component + '\n\n';
            comment += classification.summary + '\n\n';

            if (classification.needsMoreInfo) {
              comment += '> We need a bit more information to investigate this. Please check the labels and provide any additional details.\n\n';
            }

            comment += '---\n*Classified automatically by AI triage*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment
            });

            // Create Azure DevOps work item
            if (process.env.AZURE_DEVOPS_PAT) {
              try {
                const adoUrl = process.env.AZURE_DEVOPS_ORG + '/' + encodeURIComponent(process.env.AZURE_DEVOPS_PROJECT) + '/_apis/wit/workitems/$' + encodeURIComponent(classification.azureType) + '?api-version=7.1';
                const adoAuth = Buffer.from(':' + process.env.AZURE_DEVOPS_PAT).toString('base64');
                const issueUrl = issue.html_url;
                const adoTitle = '[GitHub #' + issue.number + '] ' + title;

                const patches = [
                  { op: 'add', path: '/fields/System.Title', value: adoTitle },
                  { op: 'add', path: '/fields/System.Description', value: '<a href="' + issueUrl + '">GitHub Issue #' + issue.number + '</a><br><br>' + body.replace(/\n/g, '<br>') },
                  { op: 'add', path: '/fields/System.Tags', value: 'github;' + classification.component + ';' + classification.priority }
                ];

                const adoPriority = { critical: 1, high: 2, medium: 3, low: 4 };
                patches.push({ op: 'add', path: '/fields/Microsoft.VSTS.Common.Priority', value: adoPriority[classification.priority] });

                const adoResponse = await fetch(adoUrl, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json-patch+json',
                    'Authorization': 'Basic ' + adoAuth
                  },
                  body: JSON.stringify(patches)
                });

                if (adoResponse.ok) {
                  const adoItem = await adoResponse.json();
                  console.log('Created Azure DevOps work item #' + adoItem.id);
                } else {
                  const adoErr = await adoResponse.text();
                  console.log('Azure DevOps sync failed: ' + adoResponse.status + ' ' + adoErr);
                }
              } catch (adoError) {
                console.log('Azure DevOps sync error: ' + adoError.message);
              }
            }
